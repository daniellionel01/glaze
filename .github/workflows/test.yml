name: test

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package:
          - glaze
          - glaze_oat
          - glaze_basecoat

    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          gleam-version: "1.15.0"
          rebar3-version: "3"
      - run: gleam deps download
        working-directory: ${{ matrix.package }}
      - run: gleam test
        working-directory: ${{ matrix.package }}
      - run: gleam format --check src test
        working-directory: ${{ matrix.package }}
